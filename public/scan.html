<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClubPulse - Camera Attendance Scanner</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- HTML5 QR Code CDN -->
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <div class="app-container">
    <div class="content-body">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; align-items: start;">
        <!-- Scanner panel -->
        <div class="card">
          <div class="card-title">
            <span>Live Camera Feed</span>
            <i class="fa-solid fa-camera" style="color: var(--violet);"></i>
          </div>
          
          <div style="margin-bottom: 16px;">
            <label for="camera-select" style="display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600;">Choose Video Device</label>
            <select id="camera-select" class="form-control" onchange="startScanner()">
              <option value="">Detecting cameras...</option>
            </select>
          </div>

          <div class="scanner-viewport">
            <div class="scanner-laser" id="scanner-laser" style="display: none;"></div>
            <div id="scanner-reader" style="width: 100%; height: 100%;"></div>
          </div>

          <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" style="flex: 1;" onclick="startScanner()">
              <i class="fa-solid fa-play"></i> Start Camera
            </button>
            <button class="btn btn-secondary" onclick="stopScanner()">
              <i class="fa-solid fa-stop"></i> Stop
            </button>
          </div>
        </div>

        <!-- Details verification panel -->
        <div class="card">
          <div class="card-title">
            <span>Check-in Verification Log</span>
            <i class="fa-solid fa-shield-check" style="color: var(--mint);"></i>
          </div>
          
          <div id="scan-status-alert" style="padding: 16px; border-radius: 10px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); text-align: center; margin-bottom: 24px; font-weight: 600; font-size: 15px;">
            <i class="fa-solid fa-circle-info" style="color: var(--violet); margin-right: 8px;"></i> Awaiting QR Scan...
          </div>

          <div id="checkin-details" style="display: none; background: rgba(255, 255, 255, 0.01); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px;">
            <h4 style="color: var(--mint); margin-bottom: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px;">
              <i class="fa-solid fa-circle-check"></i> Checked-in Successfully
            </h4>
            <div style="display: flex; flex-direction: column; gap: 10px; font-size: 13px;">
              <div>
                <span style="color: var(--text-secondary);">Team Name:</span>
                <strong id="detail-team-name" style="color: var(--text-primary); font-size: 15px;">-</strong>
              </div>
              <div>
                <span style="color: var(--text-secondary);">Allocated Event:</span>
                <strong id="detail-event-name" style="color: var(--text-primary); font-size: 14px;">-</strong>
              </div>
              <div>
                <span style="color: var(--text-secondary);">Database ID Reference:</span>
                <span id="detail-team-id" style="font-family: var(--font-mono); color: var(--text-muted); font-size: 11px;">-</span>
              </div>
              <div>
                <span style="color: var(--text-secondary);">Check-in Timestamp:</span>
                <span id="detail-time" style="color: var(--text-secondary); font-family: var(--font-mono);">00:00:00</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/layout.js"></script>
  <script>
    let html5QrCode = null;
    let cameraDevices = [];

    // Synthesize beep or buzz sounds using Web Audio API
    function playBeep(success = true) {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        if (success) {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, ctx.currentTime); // High pitch check-in beep
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
          osc.start();
          osc.stop(ctx.currentTime + 0.15);
        } else {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(220, ctx.currentTime); // Low buzz failure
          gain.gain.setValueAtTime(0.12, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
          osc.start();
          osc.stop(ctx.currentTime + 0.35);
        }
      } catch (err) {
        console.warn('Audio device connection blocked beep.', err);
      }
    }

    async function detectCameras() {
      try {
        const devices = await Html5Qrcode.getCameras();
        cameraDevices = devices;
        const select = document.getElementById('camera-select');
        select.innerHTML = '';
        
        if (devices && devices.length > 0) {
          devices.forEach((device, index) => {
            select.innerHTML += `<option value="${device.id}">${device.label || `Camera ${index + 1}`}</option>`;
          });
        } else {
          select.innerHTML = '<option value="">No cameras detected</option>';
        }
      } catch (err) {
        console.error('Camera detection error:', err);
        document.getElementById('camera-select').innerHTML = '<option value="">Permission Blocked</option>';
      }
    }

    async function startScanner() {
      const cameraId = document.getElementById('camera-select').value;
      if (!cameraId) {
        alert('Please choose a camera source device.');
        return;
      }

      if (html5QrCode) {
        await stopScanner();
      }

      document.getElementById('scanner-laser').style.display = 'block';
      const statusAlert = document.getElementById('scan-status-alert');
      statusAlert.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="color: var(--mint); margin-right: 8px;"></i> Camera Live. Scanning...';
      statusAlert.style.borderColor = 'var(--mint-glow)';
      statusAlert.style.background = 'rgba(0, 255, 204, 0.03)';
      statusAlert.style.color = 'var(--mint)';

      html5QrCode = new Html5Qrcode("scanner-reader");
      
      const config = {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      };

      try {
        await html5QrCode.start(
          cameraId, 
          config, 
          async (decodedText, decodedResult) => {
            console.log(`Scan detected: ${decodedText}`);
            // Briefly pause scanner to avoid duplicate read spikes
            stopScanner();
            handleCheckin(decodedText);
          },
          (errorMessage) => {
            // silent scanner verbose
          }
        );
      } catch (err) {
        console.error('Failed to start scanner:', err);
        statusAlert.innerHTML = '<i class="fa-solid fa-circle-exclamation" style="color: var(--rose); margin-right: 8px;"></i> Scanner initialization failed.';
        statusAlert.style.borderColor = 'rgba(244, 63, 94, 0.2)';
        statusAlert.style.background = 'rgba(244, 63, 94, 0.05)';
        statusAlert.style.color = 'var(--rose)';
      }
    }

    async function stopScanner() {
      document.getElementById('scanner-laser').style.display = 'none';
      if (html5QrCode) {
        try {
          await html5QrCode.stop();
          html5QrCode = null;
        } catch (err) {
          console.error('Failed to stop scanner:', err);
        }
      }
    }

    async function handleCheckin(qrText) {
      const statusAlert = document.getElementById('scan-status-alert');
      const detailsBox = document.getElementById('checkin-details');
      
      try {
        const payload = JSON.parse(qrText);
        
        if (!payload.teamId || !payload.eventId) {
          throw new Error('Malformed Ticket QR Data.');
        }

        // Post check-in attendance
        const res = await fetch(`/api/teams/${payload.teamId}/attend`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ eventId: payload.eventId })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Check-in failed');
        }

        const data = await res.json();
        
        // Success
        playBeep(true);
        statusAlert.innerHTML = '<i class="fa-solid fa-circle-check" style="color: var(--mint); margin-right: 8px;"></i> Scan Verified Successfully!';
        statusAlert.style.borderColor = 'var(--mint-glow)';
        statusAlert.style.background = 'rgba(0, 255, 204, 0.08)';
        statusAlert.style.color = 'var(--mint)';

        // Render card
        document.getElementById('detail-team-name').textContent = payload.teamName || data.team.name;
        document.getElementById('detail-event-name').textContent = payload.eventName || 'Registered Event';
        document.getElementById('detail-team-id').textContent = payload.teamId;
        document.getElementById('detail-time').textContent = new Date().toLocaleTimeString();
        detailsBox.style.display = 'block';

      } catch (err) {
        // Failure
        playBeep(false);
        statusAlert.innerHTML = `<i class="fa-solid fa-circle-xmark" style="color: var(--rose); margin-right: 8px;"></i> Error: ${err.message}`;
        statusAlert.style.borderColor = 'rgba(244, 63, 94, 0.2)';
        statusAlert.style.background = 'rgba(244, 63, 94, 0.08)';
        statusAlert.style.color = 'var(--rose)';
        detailsBox.style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      detectCameras();
    });
  </script>
</body>
</html>
