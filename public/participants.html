<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClubPulse - Teams & Participants</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <div class="content-body">
      <!-- Info Header -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <p style="font-size: 14px; color: var(--text-secondary); max-width: 600px;">
          View registered hackathon and competition teams. Perform evaluations, award grades, and record attendance check-ins directly.
        </p>
        <a href="register.html" class="btn btn-mint btn-sm" target="_blank">
          <i class="fa-solid fa-square-plus"></i> Open Public Registration Portal
        </a>
      </div>

      <!-- Teams Grid -->
      <div class="events-grid" id="teams-grid">
        <!-- Dynamically loaded team cards -->
      </div>
    </div>
  </div>

  <!-- Grading Modal -->
  <div class="modal-overlay" id="grade-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h3>Evaluate Team Performance</h3>
        <i class="fa-solid fa-xmark modal-close" onclick="closeGradeModal()"></i>
      </div>
      <form id="grade-form" onsubmit="saveGrade(event)">
        <input type="hidden" id="grade-team-id">
        <div class="modal-body">
          <div class="form-group">
            <label for="performance-grade">Performance Score (0 - 100)</label>
            <input type="number" id="performance-grade" class="form-control" min="0" max="100" placeholder="e.g. 92" required>
          </div>
          <div class="form-group">
            <label for="performance-feedback">Feedback & Comments</label>
            <textarea id="performance-feedback" class="form-control" rows="4" placeholder="Enter evaluation summary details..." required></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeGradeModal()">Cancel</button>
          <button type="submit" class="btn btn-mint">Submit Grade</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Team Check-in Modal -->
  <div class="modal-overlay" id="checkin-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h3>Team Attendance Check-in</h3>
        <i class="fa-solid fa-xmark modal-close" onclick="closeCheckinModal()"></i>
      </div>
      <form id="checkin-form" onsubmit="saveCheckin(event)">
        <input type="hidden" id="checkin-team-id">
        <div class="modal-body">
          <div class="form-group">
            <label for="checkin-event">Select Event</label>
            <select id="checkin-event" class="form-control" required>
              <!-- Populated dynamically with events -->
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeCheckinModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Check-in Team</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Resend Pass Modal -->
  <div class="modal-overlay" id="resend-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h3>Resend Participant ID Card</h3>
        <i class="fa-solid fa-xmark modal-close" onclick="closeResendModal()"></i>
      </div>
      <form id="resend-form" onsubmit="triggerResend(event)">
        <input type="hidden" id="resend-team-id">
        <input type="hidden" id="resend-participant-email">
        <div class="modal-body">
          <div class="form-group">
            <label for="resend-name">Participant Name</label>
            <input type="text" id="resend-name" class="form-control" readonly style="background: rgba(255, 255, 255, 0.05); color: var(--text-muted);">
          </div>
          <div class="form-group">
            <label for="resend-email-input">Recipient Email Address</label>
            <input type="email" id="resend-email-input" class="form-control" placeholder="enter email..." required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeResendModal()">Cancel</button>
          <button type="submit" class="btn btn-mint" id="resend-submit-btn">
            <i class="fa-solid fa-paper-plane"></i> Send Pass
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>
    let allTeams = [];
    let allEvents = [];
    let allMembers = [];

    async function loadInitialData() {
      try {
        const eventsRes = await fetch('/api/events');
        allEvents = await eventsRes.json();

        const teamsRes = await fetch('/api/teams');
        allTeams = await teamsRes.json();
        
        const membersRes = await fetch('/api/members');
        allMembers = await membersRes.json();
        
        renderTeams();
      } catch (err) {
        console.error('Error loading initial data:', err);
      }
    }

    async function assignToClub(name, email) {
      if (!confirm(`Are you sure you want to assign/promote ${name} (${email}) as a Club Member?`)) return;
      try {
        const payload = {
          name,
          email,
          role: 'Member',
          status: 'active',
          completedTasks: 0,
          engagementScore: 10
        };
        const res = await fetch('/api/members', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          alert(`Successfully assigned ${name} as a Club Member!`);
          loadInitialData();
        } else {
          const err = await res.json();
          alert(err.error || 'Failed to assign member to club.');
        }
      } catch (err) {
        console.error('Error assigning member to club:', err);
        alert('An error occurred during promotion.');
      }
    }

    function renderTeams() {
      const grid = document.getElementById('teams-grid');
      grid.innerHTML = '';

      if (allTeams.length > 0) {
        allTeams.forEach(team => {
          const eventName = team.registeredEvent ? team.registeredEvent.title : 'Unknown Event';
          const problemText = team.problemStatement 
            ? `<span style="color: var(--mint); font-weight: 600;">${team.problemStatement}</span>`
            : '<span style="color: var(--text-muted); font-style: italic;">No problem statement allocated</span>';

          const hasGrade = team.performanceGrade > 0;
          const gradeText = hasGrade 
            ? `<span style="color: var(--gold); font-weight: 800; font-size: 16px;">${team.performanceGrade}/100</span>` 
            : '<span style="color: var(--text-secondary); font-size: 12px; font-weight: 600;">UNGRADED</span>';

          const attendedCount = team.attendedEvents ? team.attendedEvents.length : 0;

          const submissionHtml = team.projectSubmitted
            ? `<div style="background: rgba(0, 255, 204, 0.03); border: 1px solid var(--mint-glow); border-radius: 8px; padding: 12px; margin-bottom: 14px; font-size: 12px;">
                <div style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--mint); margin-bottom: 8px; letter-spacing: 0.5px; display: flex; align-items: center; gap: 4px;">
                  <i class="fa-solid fa-circle-check"></i> Project Gateway Submission
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                  <a href="${team.projectLiveLink}" target="_blank" class="btn btn-secondary btn-xs" style="font-size: 10px; padding: 4px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 4px; border-color: var(--border-color);">
                    <i class="fa-solid fa-globe" style="color: var(--mint);"></i> Live Demo
                  </a>
                  <a href="${team.projectGithubLink}" target="_blank" class="btn btn-secondary btn-xs" style="font-size: 10px; padding: 4px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 4px; border-color: var(--border-color);">
                    <i class="fa-brands fa-github" style="color: var(--violet);"></i> GitHub Repo
                  </a>
                  <a href="${team.projectPptLink}" target="_blank" class="btn btn-secondary btn-xs" style="font-size: 10px; padding: 4px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 4px; border-color: var(--border-color);">
                    <i class="fa-solid fa-file-powerpoint" style="color: var(--rose);"></i> Presentation
                  </a>
                  <a href="${team.projectReportLink}" target="_blank" class="btn btn-secondary btn-xs" style="font-size: 10px; padding: 4px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 4px; border-color: var(--border-color);">
                    <i class="fa-solid fa-file-lines" style="color: var(--gold);"></i> Report PDF
                  </a>
                </div>
              </div>`
            : `<div style="background: rgba(255, 255, 255, 0.02); border: 1px dashed var(--border-color); border-radius: 8px; padding: 10px; margin-bottom: 14px; font-size: 11px; color: var(--text-muted); font-style: italic; text-align: center;">
                <i class="fa-solid fa-clock"></i> No project submitted yet.
              </div>`;

          const isLeaderClubMember = allMembers.some(m => m.email.toLowerCase() === team.leaderEmail.toLowerCase());
          const leaderBadgeOrBtn = isLeaderClubMember
            ? `<span class="badge badge-active" style="padding: 2px 6px; font-size: 9px; font-weight: 600; text-transform: none; letter-spacing: 0;"><i class="fa-solid fa-circle-check"></i> Club Member</span>`
            : `<button class="btn btn-mint btn-xs" style="font-size: 9px; padding: 2px 6px;" onclick="assignToClub('${team.leaderName.replace(/'/g, "\\'")}', '${team.leaderEmail.replace(/'/g, "\\'")}')"><i class="fa-solid fa-user-plus"></i> Assign to Club</button>`;

          const leaderStatusColor = getEmailStatusColor(team.leaderEmailStatus);
          const leaderStatusIcon = getEmailStatusIcon(team.leaderEmailStatus);

          grid.innerHTML += `
            <div class="card event-card" id="team-${team._id}">
              <div class="event-meta">
                <span class="badge badge-completed" style="text-transform: none; font-size: 10px;">${eventName}</span>
                <div style="display: flex; align-items: center; gap: 6px;">
                  <span style="font-size: 11px; color: var(--text-muted);">Grade:</span>
                  ${gradeText}
                </div>
              </div>
              <h4 style="font-size: 18px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px;">
                <i class="fa-solid fa-shield-halved" style="color: var(--violet); font-size: 14px;"></i> ${team.name}
              </h4>
              <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px;">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px;">
                  <span>Leader: <strong>${team.leaderName}</strong> (${team.leaderEmail})</span>
                  ${leaderBadgeOrBtn}
                </div>
                <div style="display: flex; align-items: center; gap: 8px; padding-left: 2px;">
                  <span style="font-size: 10px; color: ${leaderStatusColor}; font-weight: 600;">
                    <i class="fa-solid ${leaderStatusIcon}"></i> Email: ${team.leaderEmailStatus || 'pending'}
                  </span>
                  <button class="btn btn-secondary btn-xs" style="font-size: 9px; padding: 2px 6px;" onclick="openResendModal('${team._id}', '${team.leaderName.replace(/'/g, "\\'")}', '${team.leaderEmail.replace(/'/g, "\\'")}', '${eventName.replace(/'/g, "\\'")}', '${team.college.replace(/'/g, "\\'")}', true)">
                    <i class="fa-solid fa-paper-plane"></i> Resend Pass
                  </button>
                </div>
              </div>
              
              <div style="background: rgba(255, 255, 255, 0.01); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; margin-bottom: 14px;">
                <div style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px;">Members (${team.members ? team.members.length : 0})</div>
                <ul style="list-style: none; font-size: 12px; color: var(--text-primary); display: flex; flex-direction: column; gap: 8px;">
                  ${team.members && team.members.length > 0 
                    ? team.members.map(m => {
                        const isClubMember = allMembers.some(cm => cm.email.toLowerCase() === m.email.toLowerCase());
                        const memberBadgeOrBtn = isClubMember
                          ? `<span class="badge badge-active" style="padding: 1px 4px; font-size: 8px; font-weight: 600; text-transform: none; letter-spacing: 0;"><i class="fa-solid fa-circle-check"></i> Club Member</span>`
                          : `<button class="btn btn-mint btn-xs" style="font-size: 8px; padding: 1px 4px;" onclick="assignToClub('${m.name.replace(/'/g, "\\'")}', '${m.email.replace(/'/g, "\\'")}')"><i class="fa-solid fa-user-plus"></i> Assign to Club</button>`;
                        
                        const statusColor = getEmailStatusColor(m.emailStatus);
                        const statusIcon = getEmailStatusIcon(m.emailStatus);

                        return `<li style="display: flex; flex-direction: column; gap: 4px; padding-bottom: 6px; border-bottom: 1px solid rgba(255, 255, 255, 0.02);">
                          <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px; width: 100%;">
                            <span><i class="fa-regular fa-user" style="margin-right: 6px; font-size: 10px; color: var(--violet);"></i> ${m.name} (${m.email})</span>
                            ${memberBadgeOrBtn}
                          </div>
                          <div style="display: flex; align-items: center; gap: 8px; padding-left: 16px;">
                            <span style="font-size: 10px; color: ${statusColor}; font-weight: 600;">
                              <i class="fa-solid ${statusIcon}"></i> Email: ${m.emailStatus || 'pending'}
                            </span>
                            <button class="btn btn-secondary btn-xs" style="font-size: 9px; padding: 1px 4px;" onclick="openResendModal('${team._id}', '${m.name.replace(/'/g, "\\'")}', '${m.email.replace(/'/g, "\\'")}', '${eventName.replace(/'/g, "\\'")}', '${team.college.replace(/'/g, "\\'")}', false)">
                              <i class="fa-solid fa-paper-plane"></i> Resend Pass
                            </button>
                          </div>
                        </li>`;
                      }).join('')
                    : '<li style="color: var(--text-muted); font-style: italic;">No additional team members listed.</li>'
                  }
                </ul>
              </div>

              <div style="font-size: 13px; margin-bottom: 8px;">
                <span style="color: var(--text-secondary);">Topic:</span> ${problemText}
              </div>
              
              ${submissionHtml}
              
              <div style="font-size: 13px; margin-bottom: 16px;">
                <span style="color: var(--text-secondary);">Check-ins:</span> 
                <span class="badge badge-active" style="font-family: var(--font-mono); font-size: 10px; padding: 2px 6px;">${attendedCount} Events Attended</span>
              </div>

              ${team.performanceFeedback 
                ? `<div style="font-size: 11px; color: var(--text-muted); background: rgba(0, 0, 0, 0.2); padding: 8px; border-radius: 6px; margin-bottom: 16px; border-left: 2px solid var(--gold); font-style: italic;">"${team.performanceFeedback}"</div>`
                : ''
              }

              <div class="event-actions">
                <button class="btn btn-secondary btn-sm" style="flex: 1;" onclick="openCheckinModal('${team._id}', '${team.registeredEvent ? team.registeredEvent._id : ''}')">
                  <i class="fa-solid fa-clipboard-user"></i> Check-in
                </button>
                <button class="btn btn-mint btn-sm" style="flex: 1;" onclick="openGradeModal('${team._id}', ${team.performanceGrade || 0}, '${team.performanceFeedback || ''}')">
                  <i class="fa-solid fa-square-poll-vertical"></i> Evaluate
                </button>
              </div>
            </div>
          `;
        });
      } else {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">No registered teams found.</div>`;
      }
    }

    // Grade Team Modal
    function openGradeModal(teamId, currentGrade = 0, currentFeedback = '') {
      document.getElementById('grade-team-id').value = teamId;
      document.getElementById('performance-grade').value = currentGrade || '';
      document.getElementById('performance-feedback').value = currentFeedback;
      document.getElementById('grade-modal').classList.add('active');
    }

    function closeGradeModal() {
      document.getElementById('grade-modal').classList.remove('active');
    }

    async function saveGrade(e) {
      e.preventDefault();
      const teamId = document.getElementById('grade-team-id').value;
      const payload = {
        performanceGrade: parseInt(document.getElementById('performance-grade').value) || 0,
        performanceFeedback: document.getElementById('performance-feedback').value
      };

      try {
        const res = await fetch(`/api/teams/${teamId}/grade`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          closeGradeModal();
          loadInitialData();
        } else {
          alert('Failed to save grade.');
        }
      } catch (err) {
        console.error('Error saving grade:', err);
      }
    }

    // Check-in Team Modal
    function openCheckinModal(teamId, defaultEventId) {
      document.getElementById('checkin-team-id').value = teamId;
      const select = document.getElementById('checkin-event');
      select.innerHTML = '';

      allEvents.forEach(e => {
        const selectedAttr = e._id === defaultEventId ? 'selected' : '';
        select.innerHTML += `<option value="${e._id}" ${selectedAttr}>${e.title} (${e.status})</option>`;
      });

      document.getElementById('checkin-modal').classList.add('active');
    }

    function closeCheckinModal() {
      document.getElementById('checkin-modal').classList.remove('active');
    }

    async function saveCheckin(e) {
      e.preventDefault();
      const teamId = document.getElementById('checkin-team-id').value;
      const eventId = document.getElementById('checkin-event').value;

      try {
        const res = await fetch(`/api/teams/${teamId}/attend`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ eventId })
        });

        if (res.ok) {
          closeCheckinModal();
          loadInitialData();
        } else {
          alert('Failed to check in team.');
        }
      } catch (err) {
        console.error('Error checking in team:', err);
      }
    }

    function getEmailStatusColor(status) {
      if (status === 'sent' || status === 'mock_sent') return 'var(--mint)';
      if (status === 'failed') return 'var(--rose)';
      return 'var(--text-muted)';
    }

    function getEmailStatusIcon(status) {
      if (status === 'sent' || status === 'mock_sent') return 'fa-circle-check';
      if (status === 'failed') return 'fa-circle-xmark';
      return 'fa-clock';
    }

    function openResendModal(teamId, name, email, eventName, college, isLeader) {
      document.getElementById('resend-team-id').value = teamId;
      document.getElementById('resend-participant-email').value = email;
      document.getElementById('resend-name').value = `${name} (${isLeader ? 'Leader' : 'Member'})`;
      document.getElementById('resend-email-input').value = email;
      document.getElementById('resend-modal').classList.add('active');
    }

    function closeResendModal() {
      document.getElementById('resend-modal').classList.remove('active');
    }

    function generatePassDataUrl(name, teamName, eventName, qrCodeDataUrl, teamId, participantId, college) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = 768;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');

        const bgImg = new Image();
        bgImg.onload = () => {
          ctx.drawImage(bgImg, 0, 0, 768, 1024);

          const qrImg = new Image();
          qrImg.onload = () => {
            const qrSize = 200;
            const qrX = 255 - (qrSize / 2);
            const qrY = 531 - (qrSize / 2);
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            if (ctx.roundRect) {
              ctx.roundRect(qrX - 8, qrY - 8, qrSize + 16, qrSize + 16, 12);
            } else {
              ctx.rect(qrX - 8, qrY - 8, qrSize + 16, qrSize + 16);
            }
            ctx.fill();
            ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';

            ctx.font = '700 22px "Outfit", "Segoe UI", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(name.toUpperCase(), 480, 409);

            ctx.fillStyle = '#00ffcc';
            ctx.fillText(teamName.toUpperCase(), 480, 462);

            ctx.font = '700 20px monospace';
            ctx.fillStyle = '#a855f7';
            ctx.fillText(teamId.toUpperCase().slice(-12), 480, 548);

            ctx.fillStyle = '#fbbf24';
            ctx.fillText(participantId, 480, 640);

            ctx.font = '700 22px "Outfit", "Segoe UI", sans-serif';
            ctx.fillStyle = '#cbd5e0';
            ctx.fillText(college.toUpperCase(), 480, 728);

            ctx.textAlign = 'center';
            ctx.font = '800 28px "Outfit", "Segoe UI", sans-serif';
            ctx.fillStyle = '#00ffcc';
            ctx.fillText(eventName.toUpperCase(), 384, 825);

            resolve(canvas.toDataURL('image/png'));
          };
          qrImg.onerror = () => {
            console.error('Failed to load QR image on canvas generation, resolving without QR');
            resolve(canvas.toDataURL('image/png'));
          };
          qrImg.src = qrCodeDataUrl;
        };
        bgImg.onerror = () => {
          console.error('Failed to load background image on canvas generation, resolving with blank canvas');
          resolve(canvas.toDataURL('image/png'));
        };
        bgImg.src = 'get-pass.png';
      });
    }

    async function triggerResend(e) {
      e.preventDefault();
      const teamId = document.getElementById('resend-team-id').value;
      const participantEmail = document.getElementById('resend-participant-email').value;
      const newEmail = document.getElementById('resend-email-input').value;
      const submitBtn = document.getElementById('resend-submit-btn');

      const token = localStorage.getItem('token');
      if (!token) {
        alert('You must be logged in as admin to perform this action.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Preparing Pass...';

      try {
        // Step 1: Prepare details (fetches deterministic QR code and ticket metadata from server)
        const prepRes = await fetch('/api/teams/prepare-resend', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ teamId, participantEmail })
        });

        if (!prepRes.ok) {
          const prepErr = await prepRes.json();
          alert(prepErr.error || 'Failed to prepare resend pass.');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send Pass';
          return;
        }

        const prepData = await prepRes.json();

        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Generating Card...';

        // Step 2: Draw the card on the client-side canvas
        const cardImage = await generatePassDataUrl(
          prepData.name,
          prepData.teamName,
          prepData.eventName,
          prepData.qrCode,
          teamId,
          prepData.participantId,
          prepData.college
        );

        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mailing Pass...';

        // Step 3: Trigger the server to email the generated pass
        const resendRes = await fetch('/api/teams/resend-pass', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            teamId,
            participantEmail,
            newEmail,
            cardImage
          })
        });

        const resendData = await resendRes.json();
        if (resendRes.ok) {
          alert('ID Card pass email sent successfully!');
          closeResendModal();
          loadInitialData();
        } else {
          alert(resendData.error || 'Failed to resend pass email.');
        }
      } catch (err) {
        console.error('Error resending pass:', err);
        alert('An unexpected error occurred.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send Pass';
      }
    }

    document.addEventListener('DOMContentLoaded', loadInitialData);
  </script>
</body>
</html>
