<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClubPulse - Events Management</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <div class="content-body">
      <!-- Toolbar Section -->
      <div class="filters-bar" style="display: flex; gap: 16px; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
          <div class="filter-pills" id="event-filter-pills">
            <button class="filter-pill active" onclick="filterEvents('all')">All Events</button>
            <button class="filter-pill" onclick="filterEvents('upcoming')">Upcoming</button>
            <button class="filter-pill" onclick="filterEvents('completed')">Completed</button>
          </div>
          
          <div class="filter-pills">
            <button class="filter-pill active" id="view-list-btn" onclick="switchView('list')">
              <i class="fa-solid fa-list" style="margin-right: 4px;"></i> List
            </button>
            <button class="filter-pill" id="view-calendar-btn" onclick="switchView('calendar')">
              <i class="fa-solid fa-calendar-days" style="margin-right: 4px;"></i> Calendar
            </button>
          </div>
        </div>

        <button class="btn btn-mint" onclick="openEventModal()">
          <i class="fa-solid fa-calendar-plus"></i> Add New Event
        </button>
      </div>

      <!-- Events Grid -->
      <div class="events-grid" id="events-grid">
        <!-- Dynamically loaded cards -->
      </div>

      <!-- Calendar View Container -->
      <div id="calendar-container" class="card" style="display: none; border-color: var(--border-color); padding: 24px; margin-bottom: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px;">
          <h3 style="font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin: 0;">
            <i class="fa-solid fa-calendar-days" style="color: var(--mint);"></i>
            <span id="calendar-month-year">June 2026</span>
          </h3>
          <div style="display: flex; gap: 8px;">
            <button class="btn btn-secondary btn-sm" onclick="prevMonth()" style="padding: 6px 12px; border-color: var(--border-color);">
              <i class="fa-solid fa-chevron-left"></i> Previous
            </button>
            <button class="btn btn-secondary btn-sm" onclick="todayMonth()" style="padding: 6px 12px; border-color: var(--border-color);">
              Today
            </button>
            <button class="btn btn-secondary btn-sm" onclick="nextMonth()" style="padding: 6px 12px; border-color: var(--border-color);">
              Next <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>
        </div>

        <!-- Weekdays Header -->
        <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; font-weight: 700; font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 1px;">
          <div>Sun</div>
          <div>Mon</div>
          <div>Tue</div>
          <div>Wed</div>
          <div>Thu</div>
          <div>Fri</div>
          <div>Sat</div>
        </div>

        <!-- Days Grid -->
        <div id="calendar-days-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; min-height: 450px;">
          <!-- Dynamically filled with days -->
        </div>
      </div>
    </div>
  </div>

  <!-- Create/Edit Event Modal -->
  <div class="modal-overlay" id="event-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="modal-title">Add New Event</h3>
        <i class="fa-solid fa-xmark modal-close" onclick="closeEventModal()"></i>
      </div>
      <form id="event-form" onsubmit="saveEvent(event)">
        <input type="hidden" id="event-id">
        <div class="modal-body" style="max-height: 450px; overflow-y: auto; padding-right: 8px;">
          <div class="form-group">
            <label for="event-title">Event Title</label>
            <input type="text" id="event-title" class="form-control" placeholder="e.g. PulseHack 2026" required>
          </div>
          <div class="form-group">
            <label for="event-desc">Description</label>
            <textarea id="event-desc" class="form-control" rows="3" placeholder="Describe the event goals..." required></textarea>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
              <label for="event-date">Date & Time</label>
              <input type="datetime-local" id="event-date" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="event-location">Location</label>
              <input type="text" id="event-location" class="form-control" placeholder="e.g. Lab A or Virtual" required>
            </div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
              <label for="event-type">Event Type</label>
              <select id="event-type" class="form-control">
                <option value="Competition">Competition</option>
                <option value="Workshop">Workshop</option>
                <option value="Meeting">Meeting</option>
                <option value="Social">Social</option>
              </select>
            </div>
            <div class="form-group">
              <label for="event-status">Status</label>
              <select id="event-status" class="form-control">
                <option value="upcoming">Upcoming</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
              <label for="event-capacity">Max Capacity</label>
              <input type="number" id="event-capacity" class="form-control" min="1" value="100" required>
            </div>
            <div class="form-group">
              <label for="event-organizer">Organizer (Lead)</label>
              <input type="text" id="event-organizer" class="form-control" placeholder="e.g. Sophia Chen" required>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeEventModal()">Cancel</button>
          <button type="submit" class="btn btn-mint">Save Event</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Manual Attendance Modal -->
  <div class="modal-overlay" id="attendance-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h3>Record Event Attendance</h3>
        <i class="fa-solid fa-xmark modal-close" onclick="closeAttendanceModal()"></i>
      </div>
      <form id="attendance-form" onsubmit="saveAttendance(event)">
        <input type="hidden" id="attendance-event-id">
        <div class="modal-body">
          <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">
            Select all active club members who attended this event. Attendance awards <strong style="color: var(--mint);">+10 Engagement Points</strong>.
          </p>
          <div style="max-height: 250px; overflow-y: auto; padding-right: 8px;" id="members-list-checkboxes">
            <!-- Dynamic checkboxes -->
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeAttendanceModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Attendance</button>
        </div>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>
    let allEvents = [];
    let currentFilter = 'all';

    async function loadEvents() {
      try {
        const res = await fetch('/api/events');
        allEvents = await res.json();
        renderEvents();
        if (currentView === 'calendar') {
          renderCalendar();
        }
      } catch (err) {
        console.error('Error loading events:', err);
      }
    }

    function renderEvents() {
      const grid = document.getElementById('events-grid');
      grid.innerHTML = '';

      const filtered = allEvents.filter(e => {
        if (currentFilter === 'all') return true;
        return e.status === currentFilter;
      });

      if (filtered.length > 0) {
        filtered.forEach(event => {
          const statusBadge = event.status === 'upcoming' ? 'badge-upcoming' : 'badge-completed';
          const formattedDate = new Date(event.date).toLocaleDateString('en-US', {
            weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
          });

          grid.innerHTML += `
            <div class="card event-card ${event.status === 'upcoming' ? 'card-glowing-gold' : 'card-glowing-violet'}" id="event-${event._id}">
              <div class="event-meta">
                <span class="badge ${statusBadge}">${event.status}</span>
                <span style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">${event.type}</span>
              </div>
              <h4 style="font-size: 17px; font-weight: 700; margin-bottom: 10px;">${event.title}</h4>
              <p style="font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; flex: 1;">
                ${event.description}
              </p>
              <div class="event-info-row">
                <i class="fa-solid fa-calendar-day"></i>
                <span>${formattedDate}</span>
              </div>
              <div class="event-info-row">
                <i class="fa-solid fa-location-dot"></i>
                <span>${event.location}</span>
              </div>
              <div class="event-info-row" style="margin-bottom: 16px;">
                <i class="fa-solid fa-users-rectangle"></i>
                <span>Capacity: Max ${event.maxCapacity} | Lead: ${event.organizer}</span>
              </div>
              <div class="event-actions">
                <button class="btn btn-secondary btn-sm" style="flex: 1;" onclick="openAttendanceModal('${event._id}')">
                  <i class="fa-solid fa-clipboard-user"></i> Attend
                </button>
                <button class="btn btn-secondary btn-sm" onclick="editEvent('${event._id}')">
                  <i class="fa-solid fa-pen-to-square"></i>
                </button>
                <button class="btn btn-danger btn-sm" onclick="deleteEvent('${event._id}')">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>
            </div>
          `;
        });
      } else {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">No events matching filters.</div>`;
      }
    }

    function filterEvents(filterType) {
      currentFilter = filterType;
      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.toLowerCase().includes(filterType)) {
          btn.classList.add('active');
        }
      });
      renderEvents();
    }

    function openEventModal(event = null) {
      const modal = document.getElementById('event-modal');
      const form = document.getElementById('event-form');
      const title = document.getElementById('modal-title');

      if (event) {
        title.textContent = 'Edit Event Profile';
        document.getElementById('event-id').value = event._id;
        document.getElementById('event-title').value = event.title;
        document.getElementById('event-desc').value = event.description;
        
        // Format ISO date to local string required by datetime-local inputs
        const localDate = new Date(event.date).toISOString().slice(0, 16);
        document.getElementById('event-date').value = localDate;
        
        document.getElementById('event-location').value = event.location;
        document.getElementById('event-type').value = event.type;
        document.getElementById('event-status').value = event.status;
        document.getElementById('event-capacity').value = event.maxCapacity || 100;
        document.getElementById('event-organizer').value = event.organizer;
      } else {
        title.textContent = 'Add New Event';
        form.reset();
        document.getElementById('event-id').value = '';
        document.getElementById('event-capacity').value = 100;
        document.getElementById('event-status').value = 'upcoming';
      }

      modal.classList.add('active');
    }

    function closeEventModal() {
      document.getElementById('event-modal').classList.remove('active');
    }

    function editEvent(id) {
      const ev = allEvents.find(e => e._id === id);
      if (ev) openEventModal(ev);
    }

    async function saveEvent(e) {
      e.preventDefault();
      const id = document.getElementById('event-id').value;
      const payload = {
        title: document.getElementById('event-title').value,
        description: document.getElementById('event-desc').value,
        date: new Date(document.getElementById('event-date').value).toISOString(),
        location: document.getElementById('event-location').value,
        type: document.getElementById('event-type').value,
        status: document.getElementById('event-status').value,
        maxCapacity: parseInt(document.getElementById('event-capacity').value) || 100,
        organizer: document.getElementById('event-organizer').value
      };

      const url = id ? `/api/events/${id}` : '/api/events';
      const method = id ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          closeEventModal();
          loadEvents();
        } else {
          alert('Failed to save event.');
        }
      } catch (err) {
        console.error('Error saving event:', err);
      }
    }

    async function deleteEvent(id) {
      if (!confirm('Are you sure you want to delete this event?')) return;
      try {
        const res = await fetch(`/api/events/${id}`, { method: 'DELETE' });
        if (res.ok) {
          loadEvents();
        } else {
          alert('Failed to delete event.');
        }
      } catch (err) {
        console.error('Error deleting event:', err);
      }
    }

    // Attendance Management
    async function openAttendanceModal(eventId) {
      document.getElementById('attendance-event-id').value = eventId;
      const container = document.getElementById('members-list-checkboxes');
      container.innerHTML = '<div style="color: var(--text-muted); font-size: 13px;">Loading club members...</div>';
      
      document.getElementById('attendance-modal').classList.add('active');

      try {
        const res = await fetch('/api/members');
        const members = await res.json();
        
        container.innerHTML = '';
        const activeMembers = members.filter(m => m.status === 'active');
        
        if (activeMembers.length > 0) {
          activeMembers.forEach(m => {
            container.innerHTML += `
              <label style="display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: background var(--transition-fast);">
                <input type="checkbox" name="attendance-member" value="${m._id}" style="width: 16px; height: 16px; accent-color: var(--violet);">
                <div>
                  <div style="font-size: 14px; font-weight: 600;">${m.name}</div>
                  <div style="font-size: 11px; color: var(--text-secondary);">${m.role} • Score: ${m.engagementScore}</div>
                </div>
              </label>
            `;
          });
        } else {
          container.innerHTML = '<div style="color: var(--text-muted); font-size: 13px; text-align: center;">No active club members found.</div>';
        }
      } catch (err) {
        container.innerHTML = '<div style="color: var(--rose); font-size: 13px;">Failed to load members list.</div>';
      }
    }

    function closeAttendanceModal() {
      document.getElementById('attendance-modal').classList.remove('active');
    }

    async function saveAttendance(e) {
      e.preventDefault();
      const eventId = document.getElementById('attendance-event-id').value;
      const checkedBoxes = document.querySelectorAll('input[name="attendance-member"]:checked');
      const memberIds = Array.from(checkedBoxes).map(cb => cb.value);

      try {
        const res = await fetch(`/api/events/${eventId}/attendance`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ memberIds })
        });

        if (res.ok) {
          alert(`Attendance recorded successfully for ${memberIds.length} members!`);
          closeAttendanceModal();
        } else {
          alert('Failed to record attendance.');
        }
      } catch (err) {
        console.error('Error saving attendance:', err);
      }
    }

    // Calendar view state variables
    let currentView = 'list';
    let calendarCurrentDate = new Date();

    function switchView(viewType) {
      currentView = viewType;
      
      const listBtn = document.getElementById('view-list-btn');
      const calendarBtn = document.getElementById('view-calendar-btn');
      const listContainer = document.getElementById('events-grid');
      const calendarContainer = document.getElementById('calendar-container');
      const filterPills = document.getElementById('event-filter-pills');
      
      if (viewType === 'list') {
        listBtn.classList.add('active');
        calendarBtn.classList.remove('active');
        listContainer.style.display = 'grid';
        calendarContainer.style.display = 'none';
        if (filterPills) {
          filterPills.style.opacity = '1';
          filterPills.style.pointerEvents = 'auto';
        }
      } else {
        listBtn.classList.remove('active');
        calendarBtn.classList.add('active');
        listContainer.style.display = 'none';
        calendarContainer.style.display = 'block';
        if (filterPills) {
          filterPills.style.opacity = '0.5';
          filterPills.style.pointerEvents = 'none';
        }
        renderCalendar();
      }
      
      localStorage.setItem('cp_events_view', viewType);
    }

    function prevMonth() {
      calendarCurrentDate.setMonth(calendarCurrentDate.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      calendarCurrentDate.setMonth(calendarCurrentDate.getMonth() + 1);
      renderCalendar();
    }

    function todayMonth() {
      calendarCurrentDate = new Date();
      renderCalendar();
    }

    function openEventModalWithDate(date) {
      openEventModal(null);
      
      // Format the date to local string required by datetime-local (yyyy-MM-ddThh:mm)
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = '09';
      const minutes = '00';
      
      const localDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
      document.getElementById('event-date').value = localDateTime;
    }

    function createDayCell(dayNumber, date, isCurrentMonth, isToday = false) {
      const cell = document.createElement('div');
      cell.style.background = isCurrentMonth ? 'rgba(255, 255, 255, 0.015)' : 'rgba(255, 255, 255, 0.003)';
      cell.style.border = '1px solid var(--border-color)';
      cell.style.borderRadius = '8px';
      cell.style.padding = '8px';
      cell.style.minHeight = '95px';
      cell.style.display = 'flex';
      cell.style.flexDirection = 'column';
      cell.style.position = 'relative';
      cell.style.transition = 'all var(--transition-fast)';
      
      if (isCurrentMonth) {
        cell.style.cursor = 'pointer';
        cell.addEventListener('mouseenter', () => {
          cell.style.borderColor = 'var(--border-glow)';
          cell.style.background = 'rgba(255, 255, 255, 0.03)';
        });
        cell.addEventListener('mouseleave', () => {
          cell.style.borderColor = 'var(--border-color)';
          cell.style.background = 'rgba(255, 255, 255, 0.015)';
        });
        
        // Add Click listener to schedule a new event
        cell.addEventListener('click', (e) => {
          if (e.target.closest('.calendar-event-badge')) return;
          openEventModalWithDate(date);
        });
      } else {
        cell.style.opacity = '0.4';
      }
      
      // Day number indicator
      const numLabel = document.createElement('div');
      numLabel.textContent = dayNumber;
      numLabel.style.fontSize = '12px';
      numLabel.style.fontWeight = '700';
      numLabel.style.alignSelf = 'flex-end';
      numLabel.style.color = isCurrentMonth ? 'var(--text-primary)' : 'var(--text-muted)';
      
      if (isToday) {
        numLabel.style.background = 'var(--mint)';
        numLabel.style.color = '#050608';
        numLabel.style.width = '20px';
        numLabel.style.height = '20px';
        numLabel.style.borderRadius = '50%';
        numLabel.style.display = 'flex';
        numLabel.style.alignItems = 'center';
        numLabel.style.justifyContent = 'center';
        numLabel.style.boxShadow = '0 0 8px var(--mint-glow)';
        cell.style.borderColor = 'var(--mint)';
      }
      
      cell.appendChild(numLabel);
      
      // Find events on this date
      const dateStr = date.toDateString();
      const eventsOnDate = allEvents.filter(e => {
        const eDate = new Date(e.date);
        return eDate.toDateString() === dateStr;
      });
      
      // Container for event badges
      const badgesContainer = document.createElement('div');
      badgesContainer.style.display = 'flex';
      badgesContainer.style.flexDirection = 'column';
      badgesContainer.style.gap = '4px';
      badgesContainer.style.marginTop = '6px';
      badgesContainer.style.flex = '1';
      badgesContainer.style.overflowY = 'auto';
      
      eventsOnDate.forEach(event => {
        const badge = document.createElement('div');
        badge.className = 'calendar-event-badge';
        badge.textContent = event.title;
        badge.title = `${event.title} (${event.location})`;
        
        // Style coding based on type
        let bg = 'rgba(251, 191, 36, 0.1)';
        let border = '1px solid var(--gold)';
        let color = '#fffbeb';
        
        if (event.type === 'Competition') {
          bg = 'rgba(0, 255, 204, 0.1)';
          border = '1px solid var(--mint)';
          color = '#e6fffb';
        } else if (event.type === 'Workshop') {
          bg = 'rgba(168, 85, 247, 0.1)';
          border = '1px solid var(--violet)';
          color = '#f9f0ff';
        } else if (event.type === 'Social') {
          bg = 'rgba(244, 63, 94, 0.1)';
          border = '1px solid var(--rose)';
          color = '#fff5f5';
        }
        
        badge.style.background = bg;
        badge.style.border = border;
        badge.style.color = color;
        badge.style.fontSize = '10px';
        badge.style.fontWeight = '700';
        badge.style.padding = '3px 6px';
        badge.style.borderRadius = '4px';
        badge.style.whiteSpace = 'nowrap';
        badge.style.overflow = 'hidden';
        badge.style.textOverflow = 'ellipsis';
        badge.style.cursor = 'pointer';
        badge.style.transition = 'transform var(--transition-fast)';
        
        badge.addEventListener('mouseenter', () => {
          badge.style.transform = 'scale(1.03)';
        });
        badge.addEventListener('mouseleave', () => {
          badge.style.transform = 'scale(1)';
        });
        
        badge.addEventListener('click', (e) => {
          e.stopPropagation();
          editEvent(event._id);
        });
        
        badgesContainer.appendChild(badge);
      });
      
      cell.appendChild(badgesContainer);
      return cell;
    }

    function renderCalendar() {
      const monthYearLabel = document.getElementById('calendar-month-year');
      const daysGrid = document.getElementById('calendar-days-grid');
      if (!monthYearLabel || !daysGrid) return;
      
      const year = calendarCurrentDate.getFullYear();
      const month = calendarCurrentDate.getMonth();
      
      // Set month-year label
      const monthName = calendarCurrentDate.toLocaleString('en-US', { month: 'long' });
      monthYearLabel.textContent = `${monthName} ${year}`;
      
      // Clear grid
      daysGrid.innerHTML = '';
      
      // First day of the month index (0-6)
      const firstDayIndex = new Date(year, month, 1).getDay();
      // Total days in the current month
      const totalDays = new Date(year, month + 1, 0).getDate();
      // Total days in the previous month
      const prevTotalDays = new Date(year, month, 0).getDate();
      
      // Days of previous month (blank/dimmed cells)
      for (let i = firstDayIndex; i > 0; i--) {
        const day = prevTotalDays - i + 1;
        const prevMonthDate = new Date(year, month - 1, day);
        daysGrid.appendChild(createDayCell(day, prevMonthDate, false));
      }
      
      // Days of current month
      const today = new Date();
      for (let day = 1; day <= totalDays; day++) {
        const currentDate = new Date(year, month, day);
        const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
        daysGrid.appendChild(createDayCell(day, currentDate, true, isToday));
      }
      
      // Days of next month to fill the remaining slots (standard calendar has 42 cells)
      const totalCells = daysGrid.children.length;
      const remainingCells = 42 - totalCells;
      for (let day = 1; day <= remainingCells; day++) {
        const nextMonthDate = new Date(year, month + 1, day);
        daysGrid.appendChild(createDayCell(day, nextMonthDate, false));
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadEvents().then(() => {
        const savedView = localStorage.getItem('cp_events_view') || 'list';
        switchView(savedView);
      });
    });
  </script>
</body>
</html>
