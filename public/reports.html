<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClubPulse - AI Reports Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Custom terminal typing styles */
    .terminal-cursor {
      display: inline-block;
      width: 8px;
      height: 15px;
      background-color: #39ff14;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
      vertical-align: middle;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    .markdown-body h2 {
      color: var(--mint);
      border-bottom: 1px solid var(--border-glow);
      padding-bottom: 6px;
      margin: 18px 0 10px 0;
      font-size: 18px;
    }
    .markdown-body h3 {
      color: var(--gold);
      margin: 14px 0 8px 0;
      font-size: 15px;
    }
    .markdown-body ul {
      padding-left: 20px;
      margin-bottom: 10px;
    }
    .markdown-body li {
      margin-bottom: 6px;
    }
    .markdown-body strong {
      color: var(--text-primary);
    }
    .markdown-body hr {
      border: none;
      border-top: 1px solid var(--border-glow);
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="content-body">
      <!-- Buttons Panel -->
      <div class="card" style="margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 16px;">
        <button class="btn btn-mint" onclick="generateReport('summary')">
          <i class="fa-solid fa-file-invoice"></i> Generate Club Report
        </button>
        <button class="btn btn-primary" onclick="generateReport('predict')">
          <i class="fa-solid fa-chart-line"></i> Predict Future Growth
        </button>
        <button class="btn btn-secondary" onclick="generateReport('schedule')" style="border-color: var(--gold-glow); color: var(--gold);">
          <i class="fa-solid fa-clock"></i> Auto-Schedule Tasks
        </button>
      </div>

      <!-- Event Report Section -->
      <div class="card" style="margin-bottom: 24px; border-color: rgba(245,158,11,0.3); background: linear-gradient(135deg, rgba(245,158,11,0.04) 0%, rgba(13,14,18,0) 60%);">
        <div class="card-title" style="margin-bottom: 14px;">
          <span><i class="fa-solid fa-calendar-check" style="color: var(--gold); margin-right: 8px;"></i>Generate Event Report</span>
          <div style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">AI-powered per-event deep analysis</div>
        </div>
        <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
          <div style="position: relative; flex: 1; min-width: 220px;">
            <select id="event-select"
              style="
                width: 100%;
                background: rgba(255,255,255,0.04);
                border: 1px solid rgba(245,158,11,0.35);
                border-radius: 10px;
                color: var(--text-primary);
                font-family: var(--font-mono);
                font-size: 13px;
                padding: 10px 38px 10px 16px;
                appearance: none;
                -webkit-appearance: none;
                cursor: pointer;
                outline: none;
                transition: border-color 0.2s, box-shadow 0.2s;
              "
              onfocus="this.style.borderColor='var(--gold)'; this.style.boxShadow='0 0 0 3px rgba(245,158,11,0.15)'"
              onblur="this.style.borderColor='rgba(245,158,11,0.35)'; this.style.boxShadow='none'">
              <option value="" disabled selected style="background:#1a1c24; color: var(--text-muted);">— Select an Event —</option>
            </select>
            <i class="fa-solid fa-chevron-down" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); color: var(--gold); pointer-events:none; font-size:11px;"></i>
          </div>
          <button id="btn-event-report" class="btn" onclick="generateEventReport()"
            style="
              background: linear-gradient(135deg, #f59e0b, #d97706);
              color: #0d0e12;
              border: none;
              font-weight: 700;
              letter-spacing: 0.3px;
              display: flex;
              align-items: center;
              gap: 8px;
              white-space: nowrap;
              box-shadow: 0 0 18px rgba(245,158,11,0.35);
              transition: all 0.2s;
            "
            onmouseover="this.style.boxShadow='0 0 28px rgba(245,158,11,0.6)'; this.style.transform='translateY(-1px)'"
            onmouseout="this.style.boxShadow='0 0 18px rgba(245,158,11,0.35)'; this.style.transform='translateY(0)'">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Event Report
          </button>
        </div>
        <div id="event-select-error" style="color: var(--rose); font-size:12px; margin-top:8px; display:none;">
          ⚠ Please select an event first.
        </div>
      </div>

      <!-- AI Console output -->
      <div class="card">
        <div class="card-title">
          <span>AI Cognitive Terminal Feed</span>
          <div style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">
            channel: secure-llm-link
          </div>
        </div>
        <div class="ai-terminal" id="terminal-screen">
          <div class="ai-terminal-prompt">guest@clubpulse:~# click an action above to initialize AI computation stream...</div>
          <div id="terminal-content" class="markdown-body"></div>
          <span id="cursor" class="terminal-cursor" style="display: none;"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>`n  <script src="js/layout.js"></script>
  <script>
    let typingInterval = null;

    // A helper to format simple markdown strings into HTML tags
    function formatMarkdown(text) {
      if (!text) return '';
      let formatted = text
        // Headings
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        // Bold
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        // Horizontal rule
        .replace(/^---$/gim, '<hr>')
        // Bullet lists
        .replace(/^\- (.*$)/gim, '<li>$1</li>');

      // Wrap consecutive <li> elements in a <ul> tag
      // To do this simply, we look for groups of <li> and wrap them
      formatted = formatted.replace(/(<li>.*<\/li>)/gs, (match) => {
        return `<ul>${match}</ul>`;
      });

      return formatted;
    }

    // Typewriter effect simulation
    function typeEffect(element, htmlContent, onComplete) {
      clearInterval(typingInterval);
      const cursor = document.getElementById('cursor');
      cursor.style.display = 'inline-block';
      element.innerHTML = '';
      
      // We type word-by-word or tag-by-tag. To keep HTML intact, we can parse it into elements or simple text chunks.
      // A simple implementation: type character by character but parse tags at once
      let i = 0;
      let currentHTML = '';
      
      typingInterval = setInterval(() => {
        if (i < htmlContent.length) {
          if (htmlContent[i] === '<') {
            // Read until closing tag
            const endIdx = htmlContent.indexOf('>', i);
            if (endIdx !== -1) {
              currentHTML += htmlContent.substring(i, endIdx + 1);
              i = endIdx + 1;
            } else {
              currentHTML += htmlContent[i];
              i++;
            }
          } else {
            currentHTML += htmlContent[i];
            i++;
          }
          element.innerHTML = currentHTML;
          // Auto scroll terminal
          const term = document.getElementById('terminal-screen');
          term.scrollTop = term.scrollHeight;
        } else {
          clearInterval(typingInterval);
          cursor.style.display = 'none';
          if (onComplete) onComplete();
        }
      }, 5); // Speed multiplier
    }

    async function generateReport(type) {
      const termContent = document.getElementById('terminal-content');
      const cursor = document.getElementById('cursor');
      
      // Reset terminal screen
      termContent.innerHTML = '';
      cursor.style.display = 'inline-block';
      
      let endpoint = '';
      let promptText = '';

      if (type === 'summary') {
        endpoint = '/api/ai/generate-report';
        promptText = 'guest@clubpulse:~# curl -X POST /api/ai/generate-report\nConnecting to cognitive node...\nExtracting club members database metadata...\nCompiling statistics summary...';
      } else if (type === 'predict') {
        endpoint = '/api/ai/predict';
        promptText = 'guest@clubpulse:~# curl -X POST /api/ai/predict\nParsing historical event attendance records...\nSynthesizing regression curve forecasting coefficients...\nCalculating team completion velocities...';
      } else if (type === 'schedule') {
        endpoint = '/api/ai/auto-schedule';
        promptText = 'guest@clubpulse:~# curl -X POST /api/ai/auto-schedule\nScanning pending task registry list...\nFetching list of active developer accounts...\nBalancing developer workloads...';
      }

      document.querySelector('#terminal-screen .ai-terminal-prompt').textContent = promptText;

      try {
        const res = await fetch(endpoint, { method: 'POST' });
        const data = await res.json();
        
        const rawReport = data.report || data.prediction;
        const htmlReport = formatMarkdown(rawReport);

        typeEffect(termContent, htmlReport);
      } catch (err) {
        cursor.style.display = 'none';
        termContent.innerHTML = `<span style="color: var(--rose);">[ERROR] System was unable to process LLM request. Verify backend connection is active.</span>`;
      }
    }

    async function generateEventReport() {
      const select = document.getElementById('event-select');
      const errorEl = document.getElementById('event-select-error');
      const eventId = select.value;

      if (!eventId) {
        errorEl.style.display = 'block';
        setTimeout(() => errorEl.style.display = 'none', 3000);
        return;
      }
      errorEl.style.display = 'none';

      const selectedEventName = select.options[select.selectedIndex].text;
      const termContent = document.getElementById('terminal-content');
      const cursor = document.getElementById('cursor');

      termContent.innerHTML = '';
      cursor.style.display = 'inline-block';

      document.querySelector('#terminal-screen .ai-terminal-prompt').textContent =
        `guest@clubpulse:~# curl -X POST /api/ai/event-report -d '{"eventId":"${eventId}"}'\nFetching event data for: ${selectedEventName}...\nAggregating team registrations and attendance records...\nRunning AI performance analysis...`;

      try {
        const res = await fetch('/api/ai/event-report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ eventId })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Unknown error');

        const htmlReport = formatMarkdown(data.report);
        typeEffect(termContent, htmlReport);
      } catch (err) {
        cursor.style.display = 'none';
        termContent.innerHTML = `<span style="color: var(--rose);">[ERROR] ${err.message || 'Could not generate event report. Check backend connection.'}</span>`;
      }
    }

    // Populate event dropdown on page load
    async function loadEvents() {
      try {
        const res = await fetch('/api/events');
        const events = await res.json();
        const select = document.getElementById('event-select');

        if (!events || events.length === 0) {
          const opt = document.createElement('option');
          opt.value = '';
          opt.disabled = true;
          opt.textContent = 'No events found in database';
          opt.style.background = '#1a1c24';
          select.appendChild(opt);
          return;
        }

        events.forEach(ev => {
          const opt = document.createElement('option');
          opt.value = ev._id;
          const dateStr = ev.date
            ? new Date(ev.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
            : '';
          const statusBadge = ev.status === 'completed' ? '✅' : ev.status === 'ongoing' ? '🟡' : '🔵';
          opt.textContent = `${statusBadge} ${ev.title}${dateStr ? ' · ' + dateStr : ''}`;
          opt.style.background = '#1a1c24';
          select.appendChild(opt);
        });
      } catch (e) {
        console.warn('Could not load events for dropdown:', e);
      }
    }

    loadEvents();
  </script>
</body>
</html>
