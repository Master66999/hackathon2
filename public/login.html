<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClubPulse — Sign In</title>
  <meta name="description" content="Sign in to your ClubPulse dashboard.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #06070a;
      --card: rgba(12,14,24,0.85);
      --border: rgba(255,255,255,0.05);
      --border-focus: rgba(139,92,246,0.6);
      --mint: #00f2fe;
      --violet: #8b5cf6;
      --gold: #f59e0b;
      --rose: #ff3366;
      --text: #f8fafc;
      --muted: #64748b;
      --input-bg: rgba(255,255,255,0.03);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Glowing background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 500px; height: 500px; background: rgba(139,92,246,0.1); top: -100px; left: -100px; animation: orbFloat1 8s ease-in-out infinite alternate; }
    .orb-2 { width: 400px; height: 400px; background: rgba(0,242,254,0.06); bottom: -80px; right: -80px; animation: orbFloat2 10s ease-in-out infinite alternate; }
    @keyframes orbFloat1 { from { transform: translate(0,0); } to { transform: translate(60px,40px); } }
    @keyframes orbFloat2 { from { transform: translate(0,0); } to { transform: translate(-40px,-30px); } }

    /* Grid pattern overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(139,92,246,0.015) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(139,92,246,0.015) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      pointer-events: none;
    }

    /* Card */
    .auth-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      padding: 24px;
    }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(139,92,246,0.08);
      animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--mint), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 32px;
      text-decoration: none;
    }
    .brand i { font-size: 20px; }

    .auth-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-sub {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 36px;
    }

    /* Form */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      transition: color 0.2s;
      pointer-events: none;
    }
    .form-control {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px 13px 42px;
      font-size: 15px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: all 0.2s;
    }
    .form-control::placeholder { color: var(--muted); }
    .form-control:focus {
      border-color: var(--violet);
      background: rgba(139,92,246,0.03);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
    }
    .form-control:focus + .input-icon,
    .input-wrapper:focus-within .input-icon { color: var(--violet); }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      transition: color 0.2s;
      background: none;
      border: none;
      padding: 4px;
    }
    .password-toggle:hover { color: var(--text); }

    .form-extras {
      display: flex;
      justify-content: flex-end;
      margin-top: -12px;
      margin-bottom: 20px;
    }
    .form-extras a { font-size: 13px; color: var(--violet); text-decoration: none; transition: color 0.2s; }
    .form-extras a:hover { color: var(--mint); }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, var(--violet), #7c3aed);
      color: #fff;
      box-shadow: 0 4px 20px rgba(139,92,246,0.35);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.3px;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(139,92,246,0.5); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .btn-submit .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error/success alert */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: fadeIn 0.3s ease both;
    }
    .alert.show { display: flex; }
    .alert-error { background: rgba(255,51,102,0.1); border: 1px solid rgba(255,51,102,0.25); color: #f87171; }
    .alert-success { background: rgba(0,242,254,0.08); border: 1px solid rgba(0,242,254,0.2); color: var(--mint); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Signup link */
    .auth-footer {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-top: 24px;
    }
    .auth-footer a { color: var(--violet); text-decoration: none; font-weight: 600; transition: color 0.2s; }
    .auth-footer a:hover { color: var(--mint); }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-wrapper">
    <a href="landing.html" class="back-link">
      <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="auth-card">
      <a href="landing.html" class="brand">
        <i class="fa-solid fa-bolt-lightning"></i> ClubPulse
      </a>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your club dashboard</p>

      <div class="alert alert-error" id="error-alert">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="error-msg">Invalid email or password.</span>
      </div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="email"
              name="email"
              class="form-control"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
            <i class="fa-solid fa-envelope input-icon"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="Your password"
              autocomplete="current-password"
              required
            >
            <i class="fa-solid fa-lock input-icon"></i>
            <button type="button" class="password-toggle" id="toggle-pwd" aria-label="Toggle password">
              <i class="fa-solid fa-eye" id="pwd-icon"></i>
            </button>
          </div>
        </div>

        <div class="form-extras">
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          <span id="btn-text">Sign In</span>
        </button>
      </form>

      <div class="divider">or</div>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one free</a>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    const existingToken = localStorage.getItem('cp_token');
    if (existingToken) {
      try {
        const p = JSON.parse(atob(existingToken.split('.')[1]));
        if (p.exp * 1000 > Date.now()) window.location.href = 'index.html';
      } catch {}
    }

    // Password toggle
    document.getElementById('toggle-pwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('pwd-icon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    });

    // Show/hide error
    function showError(msg) {
      const el = document.getElementById('error-alert');
      document.getElementById('error-msg').textContent = msg;
      el.classList.add('show');
      el.className = el.className.replace('alert-success', 'alert-error') + ' show';
    }
    function hideError() {
      document.getElementById('error-alert').classList.remove('show');
    }

    // Set loading state
    function setLoading(loading) {
      const btn = document.getElementById('submit-btn');
      const text = document.getElementById('btn-text');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = `<div class="spinner"></div><span>Signing in...</span>`;
      } else {
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-arrow-right-to-bracket"></i><span id="btn-text">Sign In</span>`;
      }
    }

    // Login form submit
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { showError('Please enter your email and password.'); return; }

      setLoading(true);
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Login failed. Please try again.');
          setLoading(false);
          return;
        }

        // Save session
        localStorage.setItem('cp_token', data.token);
        localStorage.setItem('cp_user', JSON.stringify(data.user));

        // Show success then redirect
        const alert = document.getElementById('error-alert');
        document.getElementById('error-msg').textContent = `Welcome back, ${data.user.name}! Redirecting...`;
        alert.className = 'alert alert-success show';

        setTimeout(() => { window.location.href = 'index.html'; }, 900);
      } catch (err) {
        showError('Network error. Is the server running?');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
