<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClubPulse - Members Management</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <div class="content-body">
      <!-- Toolbar Section -->
      <div class="filters-bar">
        <div class="filter-pills">
          <button class="filter-pill active" onclick="filterMembers('all')">All Members</button>
          <button class="filter-pill" onclick="filterMembers('active')">Active</button>
          <button class="filter-pill" onclick="filterMembers('inactive')">Inactive</button>
        </div>
        <button class="btn btn-mint" onclick="openMemberModal()">
          <i class="fa-solid fa-user-plus"></i> Add New Member
        </button>
      </div>

      <!-- Members Table -->
      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="table-responsive">
          <table class="custom-table">
            <thead>
              <tr>
                <th>Member</th>
                <th>Role</th>
                <th>Status</th>
                <th>Completed Tasks</th>
                <th>Engagement Score</th>
                <th style="text-align: right;">Actions</th>
              </tr>
            </thead>
            <tbody id="members-table-body">
              <!-- Dynamically loaded rows -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Teams / Participants Section -->
      <div class="card" style="margin-top: 32px; padding: 24px;">
        <div class="card-title">
          <span><i class="fa-solid fa-people-group" style="color: var(--violet); margin-right: 8px;"></i> Registered Team Participants</span>
          <div style="font-size: 11px; color: var(--text-muted); font-weight: 500;">Import event participants directly into your club roster</div>
        </div>
        <div class="table-responsive" style="margin-top: 16px;">
          <table class="custom-table">
            <thead>
              <tr>
                <th>Participant</th>
                <th>Role in Team</th>
                <th>Team Context</th>
                <th>Status in Club</th>
                <th style="text-align: right;">Action</th>
              </tr>
            </thead>
            <tbody id="teams-import-table-body">
              <!-- Loaded dynamically -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Create/Edit Member Modal Overlay -->
  <div class="modal-overlay" id="member-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="modal-title">Add New Member</h3>
        <i class="fa-solid fa-xmark modal-close" onclick="closeMemberModal()"></i>
      </div>
      <form id="member-form" onsubmit="saveMember(event)">
        <input type="hidden" id="member-id">
        <div class="modal-body">
          <div class="form-group" id="import-team-group">
            <label for="import-team-member">Import from Registered Team Member</label>
            <select id="import-team-member" class="form-control" onchange="onImportMemberSelect()">
              <option value="">-- Or select a participant to auto-fill --</option>
            </select>
          </div>
          <div class="form-group">
            <label for="member-name">Full Name</label>
            <input type="text" id="member-name" class="form-control" placeholder="e.g. Alex Rivera" required>
          </div>
          <div class="form-group">
            <label for="member-email">Email Address</label>
            <input type="email" id="member-email" class="form-control" placeholder="e.g. alex@clubpulse.com" required>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
              <label for="member-role">Club Role</label>
              <select id="member-role" class="form-control">
                <option value="Member">Member</option>
                <option value="Organizer">Organizer</option>
                <option value="Lead">Lead</option>
                <option value="Admin">Admin</option>
              </select>
            </div>
            <div class="form-group">
              <label for="member-status">Account Status</label>
              <select id="member-status" class="form-control">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
              <label for="member-tasks">Completed Tasks</label>
              <input type="number" id="member-tasks" class="form-control" min="0" value="0">
            </div>
            <div class="form-group">
              <label for="member-score">Engagement Score</label>
              <input type="number" id="member-score" class="form-control" min="0" value="0">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeMemberModal()">Cancel</button>
          <button type="submit" class="btn btn-mint">Save Member</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>
    let allMembers = [];
    let currentFilter = 'all';

    async function loadMembers() {
      try {
        const res = await fetch('/api/members');
        allMembers = await res.json();
        renderMembers();
      } catch (err) {
        console.error('Error loading members:', err);
      }
    }

    function renderMembers() {
      const tbody = document.getElementById('members-table-body');
      tbody.innerHTML = '';

      const filtered = allMembers.filter(m => {
        if (currentFilter === 'all') return true;
        return m.status === currentFilter;
      });

      if (filtered.length > 0) {
        filtered.forEach(m => {
          const badgeClass = m.status === 'active' ? 'badge-active' : 'badge-inactive';
          tbody.innerHTML += `
            <tr id="row-${m._id}">
              <td>
                <div style="font-weight: 600; font-size: 15px;">${m.name}</div>
                <div style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">${m.email}</div>
              </td>
              <td><span style="font-weight: 500;">${m.role}</span></td>
              <td><span class="badge ${badgeClass}">${m.status}</span></td>
              <td style="font-family: var(--font-mono); font-weight: 500;">${m.completedTasks || 0}</td>
              <td style="font-family: var(--font-mono); font-weight: 700; color: var(--mint);">${m.engagementScore || 0}</td>
              <td style="text-align: right;">
                <div style="display: flex; gap: 8px; justify-content: flex-end;">
                  <button class="btn btn-secondary btn-sm" onclick="editMember('${m._id}')">
                    <i class="fa-solid fa-pen-to-square"></i>
                  </button>
                  <button class="btn btn-danger btn-sm" onclick="deleteMember('${m._id}')">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          `;
        });
      } else {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 40px;">No members matching filters.</td></tr>`;
      }
    }

    function filterMembers(filterType) {
      currentFilter = filterType;
      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.toLowerCase().includes(filterType)) {
          btn.classList.add('active');
        }
      });
      renderMembers();
    }

    async function populateTeamMembersDropdown() {
      const select = document.getElementById('import-team-member');
      select.innerHTML = '<option value="">-- Or select a participant to auto-fill --</option>';
      try {
        const res = await fetch('/api/teams');
        const teams = await res.json();
        
        const seenEmails = new Set();
        
        // Filter out existing members
        const membersRes = await fetch('/api/members');
        const existingMembers = await membersRes.json();
        existingMembers.forEach(m => seenEmails.add(m.email.toLowerCase()));

        teams.forEach(team => {
          if (team.leaderEmail && !seenEmails.has(team.leaderEmail.toLowerCase())) {
            seenEmails.add(team.leaderEmail.toLowerCase());
            const opt = document.createElement('option');
            opt.value = JSON.stringify({ name: team.leaderName, email: team.leaderEmail });
            opt.textContent = `${team.leaderName} (Leader, Team: ${team.name})`;
            select.appendChild(opt);
          }
          if (team.members && Array.isArray(team.members)) {
            team.members.forEach(m => {
              if (m.email && !seenEmails.has(m.email.toLowerCase())) {
                seenEmails.add(m.email.toLowerCase());
                const opt = document.createElement('option');
                opt.value = JSON.stringify({ name: m.name, email: m.email });
                opt.textContent = `${m.name} (Member, Team: ${team.name})`;
                select.appendChild(opt);
              }
            });
          }
        });
      } catch (err) {
        console.error('Error fetching teams for dropdown:', err);
      }
    }

    function onImportMemberSelect() {
      const select = document.getElementById('import-team-member');
      if (select.value) {
        const data = JSON.parse(select.value);
        document.getElementById('member-name').value = data.name;
        document.getElementById('member-email').value = data.email;
      } else {
        document.getElementById('member-name').value = '';
        document.getElementById('member-email').value = '';
      }
    }

    async function loadTeamsForImport() {
      const tbody = document.getElementById('teams-import-table-body');
      tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 20px;">Loading participants...</td></tr>';
      try {
        const res = await fetch('/api/teams');
        const teams = await res.json();
        
        const membersRes = await fetch('/api/members');
        const existingMembers = await membersRes.json();
        const memberEmails = new Set(existingMembers.map(m => m.email.toLowerCase()));

        tbody.innerHTML = '';
        let rowCount = 0;

        teams.forEach(team => {
          // Process Leader
          const leaderEmail = team.leaderEmail.toLowerCase();
          const isLeaderMember = memberEmails.has(leaderEmail);
          
          tbody.innerHTML += `
            <tr>
              <td>
                <div style="font-weight: 600; font-size: 14px;">${team.leaderName}</div>
                <div style="font-size: 11px; color: var(--text-secondary);">${team.leaderEmail}</div>
              </td>
              <td><span style="font-weight: 500; font-size: 13px;">Team Leader</span></td>
              <td><span style="font-weight: 500; font-size: 13px; color: var(--mint);">${team.name}</span></td>
              <td>
                <span class="badge ${isLeaderMember ? 'badge-active' : 'badge-inactive'}">
                  ${isLeaderMember ? 'Club Member' : 'Not Imported'}
                </span>
              </td>
              <td style="text-align: right;">
                ${isLeaderMember 
                  ? `<button class="btn btn-secondary btn-sm" disabled style="opacity: 0.6; cursor: not-allowed;"><i class="fa-solid fa-check"></i> Imported</button>`
                  : `<button class="btn btn-mint btn-sm" onclick="importTeamMember('${team.leaderName.replace(/'/g, "\\'")}', '${team.leaderEmail.replace(/'/g, "\\'")}', 'Organizer')"><i class="fa-solid fa-file-import"></i> Import</button>`
                }
              </td>
            </tr>
          `;
          rowCount++;

          // Process Members
          if (team.members && Array.isArray(team.members)) {
            team.members.forEach(m => {
              const mEmail = m.email.toLowerCase();
              const isMember = memberEmails.has(mEmail);
              
              tbody.innerHTML += `
                <tr>
                  <td>
                    <div style="font-weight: 600; font-size: 14px;">${m.name}</div>
                    <div style="font-size: 11px; color: var(--text-secondary);">${m.email}</div>
                  </td>
                  <td><span style="font-weight: 500; font-size: 13px;">Team Member</span></td>
                  <td><span style="font-weight: 500; font-size: 13px; color: var(--text-muted);">${team.name}</span></td>
                  <td>
                    <span class="badge ${isMember ? 'badge-active' : 'badge-inactive'}">
                      ${isMember ? 'Club Member' : 'Not Imported'}
                    </span>
                  </td>
                  <td style="text-align: right;">
                    ${isMember 
                      ? `<button class="btn btn-secondary btn-sm" disabled style="opacity: 0.6; cursor: not-allowed;"><i class="fa-solid fa-check"></i> Imported</button>`
                      : `<button class="btn btn-mint btn-sm" onclick="importTeamMember('${m.name.replace(/'/g, "\\'")}', '${m.email.replace(/'/g, "\\'")}', 'Member')"><i class="fa-solid fa-file-import"></i> Import</button>`
                    }
                  </td>
                </tr>
              `;
              rowCount++;
            });
          }
        });

        if (rowCount === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 30px;">No registered team participants found.</td></tr>';
        }
      } catch (err) {
        console.error('Error loading team imports:', err);
        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--rose); padding: 20px;">Failed to load team data.</td></tr>';
      }
    }

    async function importTeamMember(name, email, defaultRole) {
      try {
        const payload = {
          name,
          email,
          role: defaultRole,
          status: 'active',
          completedTasks: 0,
          engagementScore: 10
        };

        const res = await fetch('/api/members', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const err = await res.json();
          alert(err.error || 'Failed to import member.');
          return;
        }

        // Refresh both tables
        loadMembers();
        loadTeamsForImport();
      } catch (err) {
        console.error('Error importing member:', err);
      }
    }

    function openMemberModal(member = null) {
      const modal = document.getElementById('member-modal');
      const form = document.getElementById('member-form');
      const title = document.getElementById('modal-title');

      if (member) {
        title.textContent = 'Edit Member Profile';
        document.getElementById('import-team-group').style.display = 'none';
        document.getElementById('member-id').value = member._id;
        document.getElementById('member-name').value = member.name;
        document.getElementById('member-email').value = member.email;
        document.getElementById('member-role').value = member.role;
        document.getElementById('member-status').value = member.status;
        document.getElementById('member-tasks').value = member.completedTasks || 0;
        document.getElementById('member-score').value = member.engagementScore || 0;
      } else {
        title.textContent = 'Add New Member';
        form.reset();
        document.getElementById('import-team-group').style.display = 'block';
        document.getElementById('member-id').value = '';
        document.getElementById('member-tasks').value = 0;
        document.getElementById('member-score').value = 0;
        populateTeamMembersDropdown();
      }

      modal.classList.add('active');
    }

    function closeMemberModal() {
      document.getElementById('member-modal').classList.remove('active');
    }

    function editMember(id) {
      const member = allMembers.find(m => m._id === id);
      if (member) {
        openMemberModal(member);
      }
    }

    async function saveMember(e) {
      e.preventDefault();
      const id = document.getElementById('member-id').value;
      const payload = {
        name: document.getElementById('member-name').value,
        email: document.getElementById('member-email').value,
        role: document.getElementById('member-role').value,
        status: document.getElementById('member-status').value,
        completedTasks: parseInt(document.getElementById('member-tasks').value) || 0,
        engagementScore: parseInt(document.getElementById('member-score').value) || 0
      };

      const url = id ? `/api/members/${id}` : '/api/members';
      const method = id ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const err = await res.json();
          alert(err.error || 'Failed to save member.');
          return;
        }

        closeMemberModal();
        loadMembers();
        loadTeamsForImport();
      } catch (err) {
        console.error('Error saving member:', err);
      }
    }

    async function deleteMember(id) {
      if (!confirm('Are you sure you want to delete this member?')) return;
      try {
        const res = await fetch(`/api/members/${id}`, { method: 'DELETE' });
        if (res.ok) {
          loadMembers();
          loadTeamsForImport();
        } else {
          alert('Failed to delete member.');
        }
      } catch (err) {
        console.error('Error deleting member:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadMembers();
      loadTeamsForImport();
    });
  </script>
</body>
</html>
